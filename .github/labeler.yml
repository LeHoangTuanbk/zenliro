feature:
  - head-branch: ['^feat/', 'feat/']

fix:
  - head-branch: ['^fix/', 'fix/']

chore:
  - head-branch: ['^chore/', 'chore/']

refactor:
  - head-branch: ['^refactor/', 'refactor/']

ui:
  - changed-files:
      - any-glob-to-any-file: 'src/ui/**'

electron:
  - changed-files:
      - any-glob-to-any-file: 'src/electron/**'
