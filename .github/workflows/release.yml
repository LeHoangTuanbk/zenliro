name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Build & Release (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          echo "Version set to $VERSION"

      - name: Build & Package
        run: pnpm transpile:electron && pnpm bundle:mcp && pnpm build && electron-builder --mac --arm64 --publish never

      - name: List build output
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zenliro ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/*.yml
