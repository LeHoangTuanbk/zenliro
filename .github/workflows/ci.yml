name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ts-check
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 11
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 23
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
