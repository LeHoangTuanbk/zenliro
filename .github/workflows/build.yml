name: Build

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'landing-page/**'

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm transpile:electron && pnpm build
